# Tactical Knowledge Assistant - Configuration

app:
  name: "Tactical Knowledge Assistant"
  version: "1.0.0"
  description: "A fully offline AI assistant powered by local SLM and RAG"

# Ollama LLM settings
llm:
  provider: "ollama"
  model: "qwen2.5:3b"
  base_url: "http://localhost:11434"
  temperature: 0.1
  top_p: 0.9
  top_k: 40
  num_predict: 512
  timeout: 120

# Embedding settings
embeddings:
  model: "all-MiniLM-L6-v2"
  device: "cpu"

# Text chunking settings
chunking:
  chunk_size: 800
  chunk_overlap: 150
  separators: ["\n\n", "\n", ". ", " ", ""]

# FAISS vector store settings
vector_store:
  path: "data/vector_store"
  index_name: "tactical_kb"
  similarity_metric: "cosine"

# Retrieval settings
retrieval:
  top_k: 5
  score_threshold: 0.3
  search_type: "similarity"

# Chat settings
chat:
  max_history: 10
  system_prompt: |
    You are a Tactical Knowledge Assistant. Your role is to provide accurate,
    concise answers based strictly on the provided context from the knowledge base.

    Guidelines:
    - Answer only based on the provided context
    - If the context doesn't contain enough information, say so clearly
    - Be precise and professional
    - Cite specific details from the documents when relevant
    - Format responses clearly with bullet points or numbered lists when appropriate

# Logging settings
logging:
  level: "INFO"
  file: "logs/app.log"
  max_bytes: 10485760  # 10MB
  backup_count: 3

# UI settings
ui:
  page_title: "Tactical Knowledge Assistant"
  page_icon: "🎯"
  layout: "wide"
  theme: "dark"
  max_upload_size_mb: 50
